name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: git diff --exit-code -- dist/index.js

  setup-only:
    needs: build
    runs-on: ubuntu-latest
    env:
      KIOX_TEST_LOG: ${{ github.workspace }}/.test-results/setup-only.log
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p .test-results

      - id: action
        uses: ./
        with:
          install-url: file://${{ github.workspace }}/test/fixtures/install-kiox.sh

      - name: Assert setup-only outputs
        run: |
          test "${{ steps.action.outputs.kiox-version }}" = "kiox test"
          test -x "$KIOX_BIN"
          test "$KIOX_INSTALL_DIR/kiox" = "$KIOX_BIN"
          grep -Fx 'version' "$KIOX_TEST_LOG"

  run-only:
    needs: build
    runs-on: ubuntu-latest
    env:
      KIOX_TEST_LOG: ${{ github.workspace }}/.test-results/run-only.log
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p .test-results
      - run: mkdir -p test/tmp/run-only

      - id: action
        uses: ./
        with:
          install-url: file://${{ github.workspace }}/test/fixtures/install-kiox.sh
          working-directory: test/tmp/run-only
          run: |
            pwd > run.out

      - name: Assert run-only behavior
        run: |
          test "$(cat test/tmp/run-only/run.out)" = "$GITHUB_WORKSPACE/test/tmp/run-only"
          test -z "${{ steps.action.outputs.workspace-name }}"
          test -z "${{ steps.action.outputs.workspace-root }}"
          grep -Fx 'version' "$KIOX_TEST_LOG"

  transient-workspace:
    needs: build
    runs-on: ubuntu-latest
    env:
      KIOX_TEST_LOG: ${{ github.workspace }}/.test-results/transient-workspace.log
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p .test-results

      - id: action
        uses: ./
        with:
          install-url: file://${{ github.workspace }}/test/fixtures/install-kiox.sh
          providers: |
            sourceplane/lite-ci:v0.2.25 as lite-ci
          run: |
            mkdir -p .tmp
            pwd > .tmp/pwd.txt
            printf '%s\n' "$KIOX_WORKSPACE_ROOT" > .tmp/workspace-root.txt
          outputs: |
            pwd=.tmp/pwd.txt
            workspace=.tmp/workspace-root.txt
          artifacts: |
            .tmp/pwd.txt
          artifact-name: transient-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: transient-artifacts
          path: downloaded-artifacts

      - name: Assert transient workspace behavior
        run: |
          artifact_file="$(find downloaded-artifacts -type f -name pwd.txt | head -n1)"
          case "${{ steps.action.outputs.workspace-root }}" in
            ${RUNNER_TEMP}/kiox-action-workspace-*) ;;
            *)
              echo "unexpected workspace root: ${{ steps.action.outputs.workspace-root }}" >&2
              exit 1
              ;;
          esac
          test "${{ steps.action.outputs.pwd }}" = "$GITHUB_WORKSPACE"
          test "${{ steps.action.outputs.workspace }}" = "${{ steps.action.outputs.workspace-root }}"
          test -n "$artifact_file"
          test "$(cat "$artifact_file")" = "$GITHUB_WORKSPACE"
          grep -F -- "init ${{ steps.action.outputs.workspace-root }}" "$KIOX_TEST_LOG"
          grep -F -- "--workspace ${{ steps.action.outputs.workspace-root }} add sourceplane/lite-ci:v0.2.25 as lite-ci" "$KIOX_TEST_LOG"
          grep -F -- "--workspace ${{ steps.action.outputs.workspace-root }} exec" "$KIOX_TEST_LOG"

  workspace-from-manifest:
    needs: build
    runs-on: ubuntu-latest
    env:
      KIOX_TEST_LOG: ${{ github.workspace }}/.test-results/workspace-from-manifest.log
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p .test-results

      - id: action
        uses: ./
        with:
          install-url: file://${{ github.workspace }}/test/fixtures/install-kiox.sh
          working-directory: test/fixtures/workspace
          workspace: kiox.yaml
          run: |
            mkdir -p .tmp
            pwd > .tmp/pwd.txt
          outputs: |
            pwd=.tmp/pwd.txt

      - name: Assert manifest workspace behavior
        run: |
          test "${{ steps.action.outputs.workspace-name }}" = "fixture-workspace"
          test "${{ steps.action.outputs.workspace-root }}" = "$GITHUB_WORKSPACE/test/fixtures/workspace"
          test "${{ steps.action.outputs.pwd }}" = "$GITHUB_WORKSPACE/test/fixtures/workspace"
          grep -F -- "init $GITHUB_WORKSPACE/test/fixtures/workspace/kiox.yaml" "$KIOX_TEST_LOG"

  explicit-workspace-directory:
    needs: build
    runs-on: ubuntu-latest
    env:
      KIOX_TEST_LOG: ${{ github.workspace }}/.test-results/explicit-workspace-directory.log
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p .test-results
      - run: mkdir -p test/tmp/explicit-workspace

      - id: action
        uses: ./
        with:
          install-url: file://${{ github.workspace }}/test/fixtures/install-kiox.sh
          workspace: test/tmp/explicit-workspace
          providers: |
            ghcr.io/acme/kubectl:v1.31.0 as kubectl --plain-http

      - name: Assert explicit workspace reuse
        run: |
          test "${{ steps.action.outputs.workspace-root }}" = "$GITHUB_WORKSPACE/test/tmp/explicit-workspace"
          test "$KIOX_WORKSPACE_ROOT" = "$GITHUB_WORKSPACE/test/tmp/explicit-workspace"
          test "$(kiox --workspace "$KIOX_WORKSPACE_ROOT" provider list)" = "providers: ok"
          grep -F -- "--workspace $GITHUB_WORKSPACE/test/tmp/explicit-workspace add ghcr.io/acme/kubectl:v1.31.0 as kubectl --plain-http" "$KIOX_TEST_LOG"
