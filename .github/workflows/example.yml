name: tinx CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  setup-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - run: tinx version

  transient-workspace:
    runs-on: ubuntu-latest
    steps:
      - id: node
        uses: ./
        with:
          providers: |
            core/node as node
          run: |
            mkdir -p .tmp
            node --version | tee .tmp/node-version.txt
          outputs: |
            node-version=.tmp/node-version.txt
          artifacts: |
            .tmp/node-version.txt

      - name: Show mapped output
        run: echo '${{ steps.node.outputs.outputs-json }}'

  reusable-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          workspace: ./.tinx-ci
          providers: |
            core/node as node

      - name: Use exported workspace root
        run: tinx --workspace "$TINX_WORKSPACE_ROOT" -- node --version
