name: tinx CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  setup-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - run: tinx version

  transient-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: node
        uses: ./
        with:
          providers: |
            sourceplane/lite-ci:v0.2.25 as lite-ci
          run: |
            mkdir -p .tmp
            lite-ci --help > .tmp/lite-ci-help.txt
          outputs: |
            lite-ci-help=.tmp/lite-ci-help.txt
          artifacts: |
            .tmp/lite-ci-help.txt

      - name: Show mapped output
        run: echo '${{ steps.node.outputs.outputs-json }}'

  reusable-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          workspace: ./.tinx-ci
          providers: |
            sourceplane/lite-ci:v0.2.25 as lite-ci

      - name: Use exported workspace root
        run: tinx --workspace "$TINX_WORKSPACE_ROOT" provider list
