name: "tinx"
description: "Install and run tinx — OCI-native provider runtime and workspace manager"
author: "sourceplane"
branding:
  icon: "package"
  color: "blue"

inputs:
  version:
    description: "tinx version to install (e.g. v0.3.0, latest)"
    required: false
    default: "latest"
  install-url:
    description: "Override for the tinx installer script URL"
    required: false
  workspace:
    description: |
      Workspace to initialize. Accepts either:
        - Path to a tinx.yaml workspace manifest file
        - Workspace name (pair with 'providers' to define the provider set)
    required: false
  providers:
    description: |
      Provider install specs (one per line).
      When combined with 'workspace', providers are added to the workspace.
      When used standalone, providers are installed individually.
      Format: <source> [as <alias>] [--input key=value]
      Examples:
        sourceplane/lite-ci as lite-ci
        gha://azure/setup-helm@v4 as helm --input version=3.18.4
    required: false
  run:
    description: |
      Shell commands to execute after setup.
      tinx and any installed provider aliases are available on PATH.
      If a workspace is active, commands run inside the workspace context.
    required: false
  working-directory:
    description: "Working directory for all tinx operations"
    required: false
    default: "."
  outputs:
    description: |
      Output file mappings (one per line): name=file_path
      File contents are set as individual step outputs
      and aggregated into the outputs-json output.
    required: false
  artifacts:
    description: "Artifact file paths to upload (one per line)"
    required: false
  artifact-name:
    description: "Name for the uploaded artifact bundle"
    required: false
    default: "tinx-artifacts"

outputs:
  tinx-version:
    description: "Installed tinx version string"
  outputs-json:
    description: "JSON object built from the output file mappings"

runs:
  using: "node20"
  main: "dist/index.js"
