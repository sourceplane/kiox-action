name: "kiox"
description: "Install kiox, prepare a workspace, and run commands in the current kiox execution model"
author: "sourceplane"
branding:
  icon: "package"
  color: "blue"

inputs:
  version:
    description: "kiox version to install (e.g. v0.3.0, latest)"
    required: false
    default: "latest"
  install-url:
    description: "Override for the kiox installer script URL"
    required: false
  workspace:
    description: |
      Workspace target to initialize. Accepts either:
        - Path to an existing kiox workspace manifest file (kind: Workspace)
        - Workspace directory or name to create
    required: false
  providers:
    description: |
      Provider specs to add to a workspace (one per line).
      When 'workspace' is omitted, the action creates a transient workspace for this step.
      Format: <source> [as <alias>] [--plain-http]
      Examples:
        core/node as node
        ghcr.io/acme/kubectl:v1.31.0 as kubectl --plain-http
    required: false
  run:
    description: |
      Shell commands to execute after setup.
      kiox is always available on PATH.
      When a workspace is configured, commands run inside the workspace environment,
      so provider aliases are available on PATH for this step.
    required: false
  working-directory:
    description: "Working directory for all kiox operations"
    required: false
    default: "."
  outputs:
    description: |
      Output file mappings (one per line): name=file_path
      File contents are set as individual step outputs
      and aggregated into the outputs-json output.
    required: false
  artifacts:
    description: "Artifact file paths to upload (one per line)"
    required: false
  artifact-name:
    description: "Name for the uploaded artifact bundle"
    required: false
    default: "kiox-artifacts"

outputs:
  kiox-version:
    description: "Installed kiox version string"
  workspace-name:
    description: "Initialized workspace name"
  workspace-root:
    description: "Initialized workspace root directory"
  outputs-json:
    description: "JSON object built from the output file mappings"

runs:
  using: "node20"
  main: "dist/index.js"
